services:
  - type: web
    name: hermann-ai-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://hermannmallard.com.br,http://localhost:3000
    healthCheckPath: /health
